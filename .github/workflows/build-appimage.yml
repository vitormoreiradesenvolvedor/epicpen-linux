name: Build AppImage

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão a empacotar (ex: 0.1.0)"
        required: false
        default: "dev"

jobs:
  build:
    name: Build AppImage (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para git describe

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 \
            libxcb1 libxcb-xinerama0 libxcb-cursor0 \
            libxkbcommon-x11-0 \
            python3-pyqt6 \
            fuse libfuse2

      - name: Install Python dependencies
        run: python -m pip install pytest PyQt6

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Download appimagetool
        run: |
          mkdir -p tools
          curl -L -o tools/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x tools/appimagetool

      - name: Generate icon
        run: python3 scripts/generate_icon.py

      - name: Build AppImage
        run: |
          bash scripts/build_appimage.sh
        env:
          DISPLAY: ":99"   # necessário para Qt headless

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: epicpen-appimage
          path: "*.AppImage"
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
          generate_release_notes: true
